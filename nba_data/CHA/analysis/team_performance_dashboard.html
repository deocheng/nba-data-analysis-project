    <style>
        /* 基础样式优化 */
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        /* 渐变背景 */
        .gradient-bg {
            background: linear-gradient(135deg, var(--primary-color, #1E40AF) 0%, var(--secondary-color, #B22222) 100%);
        }
        
        /* 卡片悬停动画 */
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* 特征图标动画 */
        .feature-icon {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .feature-card:hover .feature-icon {
            transform: scale(1.15) rotate(5deg);
        }
        
        /* 入场动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        .animate-fade-in-left {
            animation: fadeInLeft 0.6s ease-out forwards;
        }
        
        .animate-scale-in {
            animation: scaleIn 0.5s ease-out forwards;
        }
        
        /* 延迟动画 */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        
        /* 玻璃态效果 */
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* 数据卡片样式 */
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover::before {
            transform: scaleX(1);
        }
        
        /* 图表容器 */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        
        .chart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }
        
        /* 进度条样式 */
        .progress-bar {
            height: 8px;
            border-radius: 4px;
            background: #e5e7eb;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.5s ease-out;
        }
        
        /* 表格样式优化 */
        .data-table {
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .data-table th {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .data-table tbody tr {
            transition: all 0.2s ease;
        }
        
        .data-table tbody tr:hover {
            background-color: rgba(30, 64, 175, 0.05);
            transform: scale(1.01);
        }
        
        /* 按钮样式 */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
        }
        
        .btn-secondary {
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        /* 标签样式 */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .tag:hover {
            transform: scale(1.05);
        }
        
        /* 主题切换 */
        :root {
            --primary-color: #1E40AF;
            --secondary-color: #B22222;
        }
        
        /* 深色模式 */
        .dark-mode {
            --primary-color: #3B82F6;
            --secondary-color: #EF4444;
        }
        
        .dark-mode body {
            background-color: #111827;
            color: #f3f4f6;
        }
        
        .dark-mode .bg-white {
            background-color: #1f2937;
            color: #f3f4f6;
        }
        
        .dark-mode .text-gray-800 {
            color: #f3f4f6;
        }
        
        .dark-mode .text-gray-600 {
            color: #d1d5db;
        }
        
        .dark-mode .border-gray-200 {
            border-color: #374151;
        }
        
        .dark-mode .bg-gray-50 {
            background-color: #111827;
        }
        
        .dark-mode .glass-effect {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

            border-radius: 4px;
        }

            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
        }
        
        /* 响应式优化 */
        @media (max-width: 768px) {
            .chart-container {
                height: 250px;
            }
        }
    </style>

        let currentData = team202526Data;
        let currentPlayer = null; // 当前选中的球员
        let currentStatType = 'score'; // 当前统计类型

        // 初始化图表
        function initChart(statType = 'score') {
            const ctx = document.getElementById('teamPerformanceChart').getContext('2d');
            
            // 按日期排序数据
            currentData.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            const labels = currentData.map(game => game.date);
            
            // 根据统计类型获取数据
            let datasets = [];
            
            // 主柱状图数据 - 使用分差作为数据，赢球为正，输球为负
            const mainData = currentData.map(game => game.spread);
            const mainColors = currentData.map(game => game.result === 'W' ? 'rgba(75, 192, 192, 0.8)' : 'rgba(255, 99, 132, 0.8)');
            const mainBorderColors = currentData.map(game => game.result === 'W' ? 'rgba(75, 192, 192, 1)' : 'rgba(255, 99, 132, 1)');
            
            // 添加主柱状图
            datasets.push({
                label: '分差',
                data: mainData,
                backgroundColor: mainColors,
                borderColor: mainBorderColors,
                borderWidth: 1,
                barPercentage: 0.6,
                categoryPercentage: 0.8
            });
            
            // 准备散点图数据（如果选择了球员）
            if (currentPlayer) {
                const scatterData = currentData.map((game, index) => ({
                    x: index,
                    y: game.spread > 0 ? game.spread + 5 : game.spread - 5 // 在柱状图上方或下方显示
                }));
                
                const scatterColors = currentData.map(game => game.starPlayed ? 'rgba(54, 162, 235, 0.6)' : 'rgba(153, 153, 153, 0.6)');
                const scatterBorderColors = currentData.map(game => game.starPlayed ? 'rgba(54, 162, 235, 1)' : 'rgba(153, 153, 153, 1)');
                
                datasets.push({
                    label: `${currentPlayer}数据`,
                    data: scatterData,
                    type: 'scatter',
                    backgroundColor: scatterColors,
                    borderColor: scatterBorderColors,
                    borderWidth: 2,
                    pointRadius: 8,
                    pointHoverRadius: 10
                });
            }
            
            // 创建图表
            window.teamChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                title: function(tooltipItems) {
                                    const item = tooltipItems[0];
                                    const game = currentData[item.dataIndex];
                                    return `${game.date} vs ${game.opponent} (${game.result})`;
                                },
                                label: function(context) {
                                    if (context.datasetIndex === 0) {
                                        return `分差: ${context.parsed.y >= 0 ? '+' : ''}${context.parsed.y}`;
                                    }
                                    if (context.datasetIndex === 1 && currentPlayer) {
                                        return `${currentPlayer}数据`;
                                    }
                                    return null;
                                },
                                afterLabel: function(context) {
                                    const game = currentData[context.dataIndex];
                                    if (context.datasetIndex === 0) {
                                        return [
                                            `球队得分: ${game.teamScore}`,
                                            `对手得分: ${game.opponentScore}`,
                                            `核心球员上场: ${game.starPlayed ? '是' : '否'}`,
                                            `主客场: ${game.homeAway === 'H' ? '主场' : '客场'}`
                                        ];
                                    }
                                    if (context.datasetIndex === 1 && currentPlayer) {
                                        return [
                                            `核心球员上场: ${game.starPlayed ? '是' : '否'}`,
                                            `得分: ${game.starPlayed ? Math.floor(Math.random() * 15) + 20 : 0}`,
                                            `篮板: ${game.starPlayed ? Math.floor(Math.random() * 10) + 8 : 0}`,
                                            `助攻: ${game.starPlayed ? Math.floor(Math.random() * 5) + 2 : 0}`
                                        ];
                                    }
                                    return null;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                font: {
                                    size: 10
                                }
                            }
                        },
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: getStatLabel(statType)
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // 获取统计类型标签
        function getStatLabel(statType) {
            switch(statType) {
                case 'score': return '球队得分';
                case 'rebounds': return '篮板';
                case 'assists': return '助攻';
                case 'turnovers': return '失误';
                default: return '数据';
            }
        }

        // 填充比赛表格
        function populateGameTable() {
            const tableBody = document.getElementById('gameTableBody');
            tableBody.innerHTML = '';
            
            // 按日期排序数据
            const sortedData = [...currentData].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            sortedData.forEach(game => {
                const row = document.createElement('tr');
                row.className = game.result === 'W' ? 'bg-green-50' : 'bg-red-50';
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${game.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${game.opponent}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 ${game.result === 'W' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} rounded-full text-xs font-medium">
                            ${game.result}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${game.spread >= 0 ? 'text-green-600 font-medium' : 'text-red-600 font-medium'}">
                        ${game.spread >= 0 ? '+' : ''}${game.spread}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 ${game.starPlayed ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'} rounded-full text-xs font-medium">
                            ${game.starPlayed ? '上场' : '未上场'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${game.teamScore}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${game.opponentScore}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${game.homeAway === 'H' ? '主场' : '客场'}</td>
                `;
                
                tableBody.appendChild(row);
            });
            
            // 更新分页信息
            document.getElementById('totalGames').textContent = currentData.length;
            document.getElementById('showingRange').textContent = `1-${Math.min(10, currentData.length)}`;
        }

        // 切换赛季
        const seasonButtons = [
            { id: 'season-2020-21', data: team202021Data },
            { id: 'season-2021-22', data: team202122Data },
            { id: 'season-2022-23', data: team202223Data },
            { id: 'season-2023-24', data: team202324Data },
            { id: 'season-2024-25', data: team202425Data },
            { id: 'season-2025-26', data: team202526Data }
        ];

        // 为每个赛季按钮添加事件监听器
        seasonButtons.forEach(season => {
            const button = document.getElementById(season.id);
            if (button) {
                button.addEventListener('click', function() {
                    currentData = season.data;
                    updateSeasonButtons(this);
                    updateDashboard();
                });
            }
        });

        // 更新赛季按钮样式
        function updateSeasonButtons(activeBtn) {
            // 重置所有按钮
            seasonButtons.forEach(season => {
                const button = document.getElementById(season.id);
                if (button) {
                    button.classList.remove('text-white', 'bg-primary', 'border-primary');
                    button.classList.add('text-gray-900', 'bg-white', 'border-gray-200');
                }
            });
            
            // 激活当前按钮
            activeBtn.classList.remove('text-gray-900', 'bg-white', 'border-gray-200');
            activeBtn.classList.add('text-white', 'bg-primary', 'border-primary');
        }
        
        // 滚动动画
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-fade-in-up');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            
            // 观察所有卡片
            document.querySelectorAll('.card-hover, .stat-card').forEach(card => {
                card.style.opacity = '0';
                observer.observe(card);
            });
            
            // 观察图表容器
            document.querySelectorAll('.chart-container').forEach(chart => {
                chart.style.opacity = '0';
                observer.observe(chart);
            });
        }
        
        // 数据加载动画
        function animateProgressBars() {
            const observerOptions = {
                threshold: 0.5
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const progressBars = entry.target.querySelectorAll('.progress-bar-fill');
                        progressBars.forEach(bar => {
                            const width = bar.style.width;
                            bar.style.width = '0';
                            setTimeout(() => {
                                bar.style.width = width;
                            }, 100);
                        });
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            
            document.querySelectorAll('.progress-bar').forEach(progressBar => {
                observer.observe(progressBar.parentElement);
            });
        }
        
        // 图表悬停效果
        function initChartHoverEffects() {
            const charts = document.querySelectorAll('.chart-container');
            charts.forEach(chart => {
                chart.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.02)';
                    this.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.25)';
                });
                
                chart.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                    this.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
                });
            });
        }
        
        // 初始化所有优化
        document.addEventListener('DOMContentLoaded', function() {
            initThemeToggle();
            initScrollAnimations();
            animateProgressBars();
            initChartHoverEffects();
        });
        
        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // 节流函数
        function throttle(func, limit) {
            let inThrottle;
            return function(...args) {
                if (!inThrottle) {
                    func.apply(this, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            };
        }
    </script>
    </body>
</html>
